<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoCreatorAI - Affiliate Video Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.8); }
        }
        .glow-effect {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        .step-card {
            transition: all 0.3s ease;
        }
        .step-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                <i class="fas fa-video mr-3"></i>VideoCreatorAI
            </h1>
            <p class="text-gray-400 text-xl">Automated Affiliate Video Generation Pipeline</p>
        </header>

        <!-- Main Input Section -->
        <div class="bg-gray-800 rounded-2xl p-8 mb-8 shadow-2xl">
            <h2 class="text-2xl font-semibold mb-6 flex items-center">
                <i class="fas fa-magic mr-3 text-blue-400"></i>
                Generate Video
            </h2>
            <div class="flex gap-4 mb-6">
                <input 
                    type="text" 
                    id="productInput" 
                    placeholder="Enter product name or URL..."
                    class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                >
                <button 
                    id="fullPipelineBtn"
                    onclick="runFullPipeline()"
                    class="bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-semibold px-8 py-3 rounded-lg transition-all duration-300 glow-effect"
                >
                    <i class="fas fa-play mr-2"></i>Generate Video
                </button>
            </div>
        </div>

        <!-- Pipeline Steps -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <div id="step-script" class="step-card bg-gray-800 rounded-xl p-6 border-2 border-gray-700">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-2xl"><i class="fas fa-file-alt text-blue-400"></i></span>
                    <span id="status-script" class="text-xs px-2 py-1 rounded-full bg-gray-600 text-gray-300">Pending</span>
                </div>
                <h3 class="font-semibold mb-2">Script</h3>
                <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div id="progress-script" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div id="step-audio" class="step-card bg-gray-800 rounded-xl p-6 border-2 border-gray-700">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-2xl"><i class="fas fa-microphone text-green-400"></i></span>
                    <span id="status-audio" class="text-xs px-2 py-1 rounded-full bg-gray-600 text-gray-300">Pending</span>
                </div>
                <h3 class="font-semibold mb-2">Audio</h3>
                <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div id="progress-audio" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div id="step-transcription" class="step-card bg-gray-800 rounded-xl p-6 border-2 border-gray-700">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-2xl"><i class="fas fa-closed-captioning text-yellow-400"></i></span>
                    <span id="status-transcription" class="text-xs px-2 py-1 rounded-full bg-gray-600 text-gray-300">Pending</span>
                </div>
                <h3 class="font-semibold mb-2">Transcription</h3>
                <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div id="progress-transcription" class="h-full bg-yellow-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div id="step-assets" class="step-card bg-gray-800 rounded-xl p-6 border-2 border-gray-700">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-2xl"><i class="fas fa-film text-purple-400"></i></span>
                    <span id="status-assets" class="text-xs px-2 py-1 rounded-full bg-gray-600 text-gray-300">Pending</span>
                </div>
                <h3 class="font-semibold mb-2">Assets</h3>
                <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div id="progress-assets" class="h-full bg-purple-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div id="step-assembly" class="step-card bg-gray-800 rounded-xl p-6 border-2 border-gray-700">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-2xl"><i class="fas fa-video text-red-400"></i></span>
                    <span id="status-assembly" class="text-xs px-2 py-1 rounded-full bg-gray-600 text-gray-300">Pending</span>
                </div>
                <h3 class="font-semibold mb-2">Assembly</h3>
                <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div id="progress-assembly" class="h-full bg-red-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Status Log -->
        <div class="bg-gray-800 rounded-2xl p-6 mb-8 shadow-2xl">
            <h2 class="text-xl font-semibold mb-4 flex items-center">
                <i class="fas fa-terminal mr-3 text-green-400"></i>
                Status Log
            </h2>
            <div id="statusLog" class="bg-gray-900 rounded-lg p-4 h-64 overflow-y-auto font-mono text-sm">
                <div class="text-gray-500">Ready to generate videos...</div>
            </div>
        </div>

        <!-- Individual Actions -->
        <div class="bg-gray-800 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-semibold mb-6 flex items-center">
                <i class="fas fa-cogs mr-3 text-purple-400"></i>
                Individual Steps
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <button onclick="generateScript()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg transition-all">
                    <i class="fas fa-file-alt mr-2"></i>Generate Script
                </button>
                <button onclick="generateAudio()" class="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-3 rounded-lg transition-all">
                    <i class="fas fa-microphone mr-2"></i>Generate Audio
                </button>
                <button onclick="transcribeAudio()" class="bg-yellow-600 hover:bg-yellow-700 text-white font-semibold px-6 py-3 rounded-lg transition-all">
                    <i class="fas fa-closed-captioning mr-2"></i>Transcribe
                </button>
                <button onclick="fetchAssets()" class="bg-purple-600 hover:bg-purple-700 text-white font-semibold px-6 py-3 rounded-lg transition-all">
                    <i class="fas fa-film mr-2"></i>Fetch Assets
                </button>
                <button onclick="assembleVideo()" class="bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-3 rounded-lg transition-all">
                    <i class="fas fa-video mr-2"></i>Assemble Video
                </button>
                <button onclick="checkStatus()" class="bg-gray-600 hover:bg-gray-700 text-white font-semibold px-6 py-3 rounded-lg transition-all">
                    <i class="fas fa-info-circle mr-2"></i>Check Status
                </button>
            </div>
        </div>

        <!-- Output Section -->
        <div id="outputSection" class="bg-gray-800 rounded-2xl p-8 mt-8 shadow-2xl hidden">
            <h2 class="text-2xl font-semibold mb-6 flex items-center">
                <i class="fas fa-check-circle mr-3 text-green-400"></i>
                Output
            </h2>
            <div id="outputContent" class="text-gray-300"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let isRunning = false;

        // WebSocket connection
        function connectWebSocket() {
            ws = new WebSocket('ws://127.0.0.1:8000/ws');
            
            ws.onopen = () => {
                console.log('WebSocket connected');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                updateStepStatus(data);
                addLog(data.message, data.status);
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // Update step status
        function updateStepStatus(data) {
            const stepId = `step-${data.step}`;
            const statusId = `status-${data.step}`;
            const progressId = `progress-${data.step}`;
            
            const stepEl = document.getElementById(stepId);
            const statusEl = document.getElementById(statusId);
            const progressEl = document.getElementById(progressId);
            
            if (stepEl && statusEl && progressEl) {
                if (data.status === 'running') {
                    stepEl.classList.add('border-blue-500');
                    statusEl.textContent = 'Running';
                    statusEl.className = 'text-xs px-2 py-1 rounded-full bg-blue-600 text-white';
                } else if (data.status === 'completed') {
                    stepEl.classList.remove('border-blue-500');
                    stepEl.classList.add('border-green-500');
                    statusEl.textContent = 'Done';
                    statusEl.className = 'text-xs px-2 py-1 rounded-full bg-green-600 text-white';
                    progressEl.style.width = '100%';
                } else if (data.status === 'error') {
                    stepEl.classList.remove('border-blue-500');
                    stepEl.classList.add('border-red-500');
                    statusEl.textContent = 'Error';
                    statusEl.className = 'text-xs px-2 py-1 rounded-full bg-red-600 text-white';
                }
                
                if (data.progress > 0) {
                    progressEl.style.width = `${data.progress}%`;
                }
            }
        }

        // Add log message
        function addLog(message, status = 'info') {
            const log = document.getElementById('statusLog');
            const timestamp = new Date().toLocaleTimeString();
            const colorClass = status === 'error' ? 'text-red-400' : 
                              status === 'completed' ? 'text-green-400' : 
                              'text-blue-400';
            log.innerHTML += `<div class="${colorClass}">[${timestamp}] ${message}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // Reset steps
        function resetSteps() {
            const steps = ['script', 'audio', 'transcription', 'assets', 'assembly'];
            steps.forEach(step => {
                const stepEl = document.getElementById(`step-${step}`);
                const statusEl = document.getElementById(`status-${step}`);
                const progressEl = document.getElementById(`progress-${step}`);
                
                stepEl.classList.remove('border-blue-500', 'border-green-500', 'border-red-500');
                stepEl.classList.add('border-gray-700');
                statusEl.textContent = 'Pending';
                statusEl.className = 'text-xs px-2 py-1 rounded-full bg-gray-600 text-gray-300';
                progressEl.style.width = '0%';
            });
        }

        // API calls
        async function runFullPipeline() {
            const product = document.getElementById('productInput').value;
            if (!product) {
                addLog('Please enter a product name or URL', 'error');
                return;
            }
            
            if (isRunning) {
                addLog('Pipeline already running', 'error');
                return;
            }
            
            isRunning = true;
            resetSteps();
            addLog(`Starting full pipeline for: ${product}`, 'info');
            
            try {
                const response = await fetch('/api/pipeline/full', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addLog(`Pipeline completed! Output: ${data.output_path}`, 'completed');
                    showOutput(data);
                } else {
                    addLog(`Pipeline failed: ${data.error}`, 'error');
                }
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
            
            isRunning = false;
        }

        async function generateScript() {
            const product = document.getElementById('productInput').value;
            if (!product) {
                addLog('Please enter a product name or URL', 'error');
                return;
            }
            
            addLog('Generating script...', 'info');
            try {
                const response = await fetch('/api/script/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product })
                });
                const data = await response.json();
                if (data.success) {
                    addLog(`Script generated: ${data.segments_count} segments`, 'completed');
                } else {
                    addLog(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }

        async function generateAudio() {
            addLog('Generating audio...', 'info');
            try {
                const response = await fetch('/api/audio/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await response.json();
                if (data.success) {
                    addLog(`Audio generated: ${data.audio_path}`, 'completed');
                } else {
                    addLog(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }

        async function transcribeAudio() {
            addLog('Transcribing audio...', 'info');
            try {
                const response = await fetch('/api/transcribe', { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    addLog(`Transcription completed: ${data.subtitles_path}`, 'completed');
                } else {
                    addLog(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }

        async function fetchAssets() {
            addLog('Fetching assets...', 'info');
            try {
                const response = await fetch('/api/assets/fetch', { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    addLog(`Downloaded ${data.count} media files`, 'completed');
                } else {
                    addLog(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }

        async function assembleVideo() {
            addLog('Assembling video...', 'info');
            try {
                const response = await fetch('/api/ffmpeg/assemble', { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    addLog(`Video assembled: ${data.output_path}`, 'completed');
                    showOutput(data);
                } else {
                    addLog(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }

        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                addLog(`Status: Script=${data.script_exists}, Audio=${data.audio_exists}, Media=${data.media_files}`, 'info');
            } catch (error) {
                addLog(`Error: ${error.message}`, 'error');
            }
        }

        function showOutput(data) {
            const section = document.getElementById('outputSection');
            const content = document.getElementById('outputContent');
            section.classList.remove('hidden');
            content.innerHTML = `
                <div class="bg-gray-900 rounded-lg p-4">
                    <p class="mb-2"><strong>Output Path:</strong> ${data.output_path}</p>
                    ${data.segments_count ? `<p><strong>Segments:</strong> ${data.segments_count}</p>` : ''}
                </div>
            `;
        }

        // Initialize
        connectWebSocket();
    </script>
</body>
</html>
